<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Bếp Việt Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. BIẾN MÀU SẮC TOÀN CỤC --- */
        :root { 
            --primary: #e65100; 
            --primary-hover: #cc4800;
            --secondary: #5c3d2e; 
            --text: #424242; 
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdfbf7 0%, #f3e5d8 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
        }

        /* --- 2. KHỐI ĐĂNG NHẬP TRUNG TÂM --- */
        .login-box {
            background: white;
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(92, 61, 46, 0.08);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #f1ebe4;
            animation: fadeInUp 0.6s ease-out; /* Hiệu ứng lướt lên */
            box-sizing: border-box;
            margin: 20px;
        }

        .login-box h2 {
            color: var(--secondary);
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 2.2rem;
            font-family: 'Playfair Display', serif; /* Đồng bộ font Tiêu đề nếu có */
            font-weight: 700;
        }

        .login-box p { 
            color: #888; 
            margin-bottom: 35px; 
            font-size: 0.95rem; 
        }

        /* --- 3. FORM NHẬP LIỆU --- */
        .form-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        
        .form-group label {
            display: block; 
            font-weight: 600; 
            color: var(--secondary); 
            margin-bottom: 8px; 
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%; 
            padding: 14px 15px; 
            border: 1px solid #ddd; 
            border-radius: 12px;
            font-family: inherit; 
            font-size: 1rem; 
            outline: none; 
            box-sizing: border-box;
            background: #fafafa;
            transition: all 0.3s;
        }

        .form-control:focus { 
            border-color: var(--primary); 
            background: white;
            box-shadow: 0 0 0 4px rgba(230,81,0,0.1); 
        }

        /* --- 4. NÚT ĐĂNG NHẬP --- */
        .btn-login {
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none;
            border-radius: 12px; 
            font-size: 1.05rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(230, 81, 0, 0.2);
        }

        .btn-login:hover { 
            background: var(--primary-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(230, 81, 0, 0.3);
        }
        
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg { 
            color: #d32f2f; 
            font-size: 0.9rem; 
            margin-top: 15px; 
            display: none; 
            background: #ffebee;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
        }

        /* --- 5. HIỆU ỨNG ANIMATION --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <main class="login-box">
        <h2>BếpViệt.</h2>
        <p>Đăng nhập trang quản trị</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" class="form-control" required placeholder="Nhập tên đăng nhập...">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" class="form-control" required placeholder="Nhập mật khẩu...">
            </div>
            <button type="submit" class="btn-login" id="submitBtn">Đăng Nhập Ngay</button>
            <div id="errorMsg" class="error-msg">Sai tài khoản hoặc mật khẩu!</div>
        </form>
    </main>

    <script>
        // XỬ LÝ GỬI FORM ĐĂNG NHẬP
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Ẩn lỗi cũ và đổi trạng thái nút thành Đang xử lý
            errorMsg.style.display = 'none';
            submitBtn.innerHTML = '⏳ Đang xử lý...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:3001/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // Đăng nhập thành công: Lưu thông tin và chuyển hướng
                    localStorage.setItem('bepviet_user', JSON.stringify(result.user));
                    window.location.href = 'admin.html';
                } else {
                    // Hiện lỗi và mở khóa nút
                    errorMsg.textContent = "❌ " + result.error;
                    errorMsg.style.display = 'block';
                    submitBtn.innerHTML = 'Đăng Nhập Ngay';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                // Lỗi sập server
                errorMsg.textContent = "❌ Lỗi kết nối máy chủ!";
                errorMsg.style.display = 'block';
                submitBtn.innerHTML = 'Đăng Nhập Ngay';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
